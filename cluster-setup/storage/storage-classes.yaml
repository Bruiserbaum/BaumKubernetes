# Fast NVMe storage class — databases, caches, ML models
# Targets disks tagged with disk label "nvme" in Longhorn
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-nvme
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "2"
  diskSelector: "nvme"
  nodeSelector: "nvme"
---
# Bulk SSD storage class — media libraries, large file stores
# Targets disks tagged with disk label "ssd" in Longhorn
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-ssd
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "2"
  diskSelector: "ssd"
  nodeSelector: "ssd"
