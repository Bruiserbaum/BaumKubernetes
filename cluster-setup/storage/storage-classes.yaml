# StorageClass: fast tier (NVMe nodes — storage-tier=fast)
# Used by: authentik, ai-stack, immich, meshcentral, vaultwarden
# Path controlled by local-path-config ConfigMap: /mnt/nvme/local-path on RK1
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-path-fast
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: rancher.io/local-path
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true
---
# StorageClass: bulk tier (SSD nodes — storage-tier=bulk)
# Used by: jellyfin, plex, automatic-ripping-machine, calibre-web
# Path controlled by local-path-config ConfigMap: /mnt/ssd/local-path on CM4s
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-path-bulk
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: rancher.io/local-path
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true
