# Fast NVMe storage class — databases, caches, ML models
# Targets disks tagged "nvme" in Longhorn disk management
# 1 replica — only one NVMe node (RK1)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-nvme
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "1"
  diskSelector: "nvme"
---
# Bulk SSD storage class — replicated data that needs redundancy
# Targets disks tagged "ssd" in Longhorn disk management
# 2 replicas — two RPi4 nodes each have an SSD
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-ssd
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "2"
  diskSelector: "ssd"
---
# Media storage class — large libraries rsynced manually, no active replication
# Single replica eliminates write amplification during rips/transfers
# Use for: ARM media output, Calibre book library, Plex/Jellyfin libraries
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-media
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "1"
  diskSelector: "ssd"
