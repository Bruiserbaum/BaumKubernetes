apiVersion: v1
kind: Namespace
metadata:
  name: npm
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: npm-data-pvc
  namespace: npm
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-nvme
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: npm-mysql-pvc
  namespace: npm
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-nvme
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: npm-db
  namespace: npm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: npm-db
  template:
    metadata:
      labels:
        app: npm-db
    spec:
      containers:
        - name: mariadb
          image: jc21/mariadb-aria:latest
          env:
            - name: MYSQL_DATABASE
              value: npm
            - name: MYSQL_USER
              value: npm
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: npm-secret
                  key: DB_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: npm-secret
                  key: DB_ROOT_PASSWORD
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: npm-mysql-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: npm
  namespace: npm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: npm
  template:
    metadata:
      labels:
        app: npm
    spec:
      containers:
        - name: npm
          image: jc21/nginx-proxy-manager:latest
          env:
            - name: DB_MYSQL_HOST
              value: npm-db
            - name: DB_MYSQL_PORT
              value: "3306"
            - name: DB_MYSQL_NAME
              value: npm
            - name: DB_MYSQL_USER
              value: npm
            - name: DB_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: npm-secret
                  key: DB_PASSWORD
          ports:
            - containerPort: 80
            - containerPort: 443
            - containerPort: 81
              name: admin
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: npm-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: npm-db
  namespace: npm
spec:
  selector:
    app: npm-db
  ports:
    - port: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: npm
  namespace: npm
spec:
  selector:
    app: npm
  ports:
    - name: http
      port: 80
    - name: https
      port: 443
    - name: admin
      port: 81
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: npm-admin
  namespace: npm
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - npm.example.com
      secretName: npm-tls
  rules:
    - host: npm.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: npm
                port:
                  number: 81
