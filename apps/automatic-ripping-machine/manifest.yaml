apiVersion: v1
kind: Namespace
metadata:
  name: arm
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: arm-config-pvc
  namespace: arm
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-ssd
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: arm-media-pvc
  namespace: arm
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-media
  resources:
    requests:
      storage: 1Ti
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: arm-wrapper
  namespace: arm
data:
  docker_arm_wrapper.sh: |
    #!/bin/bash

    DEVNAME=$1
    ARMLOG="/home/arm/logs/arm.log"
    echo "[ARM] Entering docker wrapper" | logger -t ARM -s
    echo "$(date) Entering docker wrapper" >> $ARMLOG

    set -a && source /etc/environment && set +a

    if [ "$ID_CDROM_MEDIA_DVD" == "1" ]; then
        echo "$(date) [ARM] Starting ARM for DVD on ${DEVNAME}" >> $ARMLOG
        echo "[ARM] Starting ARM for DVD on ${DEVNAME}" | logger -t ARM -s
    elif [ "$ID_CDROM_MEDIA_BD" == "1" ]; then
        echo "[ARM] Starting ARM for Bluray on ${DEVNAME}" >> $ARMLOG
        echo "$(date) [ARM] Starting ARM for Bluray on ${DEVNAME}" | logger -t ARM -s
    elif [ "$ID_CDROM_MEDIA_CD" == "1" ] || [ "$ID_CDROM_MEDIA_CD_R" == "1" ] || [ "$ID_CDROM_MEDIA_CD_RW" == "1" ]; then
        echo "[ARM] Starting ARM for CD on ${DEVNAME}" | logger -t ARM -s
        echo "$(date) [ARM] Starting ARM for CD on ${DEVNAME}" >> $ARMLOG
    elif [ "$ID_FS_TYPE" != "" ]; then
        echo "[ARM] Starting ARM for Data Disk on ${DEVNAME} with File System ${ID_FS_TYPE}" | logger -t ARM -s
        echo "$(date) [ARM] Starting ARM for Data Disk on ${DEVNAME} with File System ${ID_FS_TYPE}" >> $ARMLOG
    else
        echo "[ARM] Starting ARM for unknown disc type on ${DEVNAME}" | logger -t ARM -s
        echo "$(date) [ARM] Starting ARM for unknown disc type on ${DEVNAME}" >> $ARMLOG
    fi

    # Pre-mount disc so ARM can detect VIDEO_TS correctly.
    # The Kubernetes hostPath bind mount of /dev/sr0 confuses ARM's /proc/mounts check,
    # causing it to think the disc is already mounted at /dev/sr0 (a device node, not a dir).
    # We mount it at the expected path so ARM finds VIDEO_TS and identifies the disc correctly.
    DEVBASENAME=$(basename "${DEVNAME}")
    MOUNTPOINT="/mnt/dev/${DEVBASENAME}"
    mkdir -p "${MOUNTPOINT}"
    if ! mountpoint -q "${MOUNTPOINT}"; then
        echo "$(date) [ARM] Mounting disc at ${MOUNTPOINT} (retrying up to 3 min for USB spin-up)" >> $ARMLOG
        for i in $(seq 1 18); do
            if mount -t udf,iso9660 -o ro "${DEVNAME}" "${MOUNTPOINT}" 2>/dev/null; then
                echo "$(date) [ARM] Disc mounted successfully at ${MOUNTPOINT}" >> $ARMLOG
                break
            fi
            echo "$(date) [ARM] Mount attempt ${i}/18 failed, retrying in 10s..." >> $ARMLOG
            sleep 10
        done
    fi

    cd /home/arm
    python3 /opt/arm/arm/ripper/main.py -d "${DEVNAME}" | logger -t ARM -s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arm
  namespace: arm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arm
  template:
    metadata:
      labels:
        app: arm
    spec:
      # Schedule on the node that has the optical drive
      nodeSelector:
        has-optical-drive: "true"
      initContainers:
        - name: fix-permissions
          image: busybox
          securityContext:
            runAsUser: 0
          command: ['sh', '-c', 'chown -R 1000:1000 /etc/arm/config /mnt/media']
          volumeMounts:
            - name: config
              mountPath: /etc/arm/config
            - name: media
              mountPath: /mnt/media
        - name: patch-wrapper
          image: automaticrippingmachine/automatic-ripping-machine:latest
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              cp -a /opt/arm/scripts/docker/. /scripts-docker/
              cp /wrapper/docker_arm_wrapper.sh /scripts-docker/docker_arm_wrapper.sh
              chmod 755 /scripts-docker/docker_arm_wrapper.sh
          volumeMounts:
            - name: scripts-docker
              mountPath: /scripts-docker
            - name: arm-wrapper
              mountPath: /wrapper
      containers:
        - name: arm
          image: automaticrippingmachine/automatic-ripping-machine:latest
          securityContext:
            privileged: true
          env:
            - name: ARM_UID
              value: "1000"
            - name: ARM_GID
              value: "1000"
            - name: TZ
              value: "America/New_York"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/arm/config
            - name: media
              mountPath: /mnt/media
            - name: optical
              mountPath: /dev/sr0
            - name: optical-sg
              mountPath: /dev/sg1
            - name: udev
              mountPath: /run/udev
              readOnly: true
            - name: scripts-docker
              mountPath: /opt/arm/scripts/docker
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 4Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: arm-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: arm-media-pvc
        - name: optical
          hostPath:
            path: /dev/optical
        - name: optical-sg
          hostPath:
            path: /dev/sg-optical
        - name: udev
          hostPath:
            path: /run/udev
        - name: arm-wrapper
          configMap:
            name: arm-wrapper
            defaultMode: 0755
        - name: scripts-docker
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: arm
  namespace: arm
spec:
  selector:
    app: arm
  ports:
    - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arm
  namespace: arm
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - arm.baumwire.com
      secretName: arm-tls
  rules:
    - host: arm.baumwire.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: arm
                port:
                  number: 8080
