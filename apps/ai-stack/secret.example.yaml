# kubectl create secret generic librechat-secret --namespace ai-stack \
#   --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#   --from-literal=CREDS_KEY="$(openssl rand -hex 32)" \
#   --from-literal=SESSION_SECRET="$(openssl rand -hex 32)"
apiVersion: v1
kind: Secret
metadata:
  name: librechat-secret
  namespace: ai-stack
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_openssl_rand_hex_32"
  CREDS_KEY: "REPLACE_WITH_openssl_rand_hex_32"
  SESSION_SECRET: "REPLACE_WITH_openssl_rand_hex_32"
  # OPENAI_API_KEY: "sk-..." # Optional cloud fallback
