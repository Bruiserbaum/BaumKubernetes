apiVersion: v1
kind: Namespace
metadata:
  name: crafty
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: crafty-data-pvc
  namespace: crafty
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-ssd
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crafty
  namespace: crafty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crafty
  template:
    metadata:
      labels:
        app: crafty
    spec:
      nodeSelector:
        storage-tier: bulk
      containers:
        - name: crafty
          image: registry.gitlab.com/crafty-controller/crafty-4:latest
          env:
            - name: TZ
              value: "America/New_York"
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8443
              name: https
            - containerPort: 25565
              name: mc-java-1
            - containerPort: 25566
              name: mc-java-2
            - containerPort: 25567
              name: mc-java-3
            - containerPort: 19132
              name: mc-bedrock
              protocol: UDP
          volumeMounts:
            - name: data
              mountPath: /crafty/app/config
              subPath: config
            - name: data
              mountPath: /crafty/servers
              subPath: servers
            - name: data
              mountPath: /crafty/backups
              subPath: backups
            - name: data
              mountPath: /crafty/logs
              subPath: logs
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: crafty-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: crafty-ui
  namespace: crafty
spec:
  selector:
    app: crafty
  ports:
    - name: http
      port: 8000
    - name: https
      port: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: crafty-game
  namespace: crafty
spec:
  type: NodePort
  selector:
    app: crafty
  ports:
    - name: mc-java-1
      port: 25565
      nodePort: 25565
    - name: mc-java-2
      port: 25566
      nodePort: 25566
    - name: mc-java-3
      port: 25567
      nodePort: 25567
    - name: mc-bedrock
      port: 19132
      nodePort: 19132
      protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crafty
  namespace: crafty
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - crafty.example.com
      secretName: crafty-tls
  rules:
    - host: crafty.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crafty-ui
                port:
                  number: 8443
