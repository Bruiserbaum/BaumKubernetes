apiVersion: v1
kind: Namespace
metadata:
  name: mumble
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mumble-pvc
  namespace: mumble
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-nvme
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mumble
  namespace: mumble
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mumble
  template:
    metadata:
      labels:
        app: mumble
    spec:
      containers:
        - name: mumble
          image: mumblevoip/mumble-server:latest
          env:
            - name: MUMBLE_SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mumble-secret
                  key: MUMBLE_SUPERUSER_PASSWORD
            - name: MUMBLE_CONFIG_SERVERNAME
              value: "BaumLab Voice"
            - name: MUMBLE_CONFIG_WELCOMETEXT
              value: "Welcome to BaumLab Mumble"
            - name: MUMBLE_CONFIG_USERS
              value: "50"
            - name: MUMBLE_CONFIG_REGISTERPUBLICSERVER
              value: "false"
            - name: TZ
              value: "America/New_York"
          ports:
            - containerPort: 64738
              name: voice-tcp
              protocol: TCP
            - containerPort: 64738
              name: voice-udp
              protocol: UDP
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mumble-pvc
---
# NodePort service — Mumble needs UDP which ingress-nginx cannot proxy.
# Access via <any-node-ip>:64738
apiVersion: v1
kind: Service
metadata:
  name: mumble
  namespace: mumble
spec:
  type: NodePort
  selector:
    app: mumble
  ports:
    - name: voice-tcp
      port: 64738
      targetPort: 64738
      nodePort: 64738
      protocol: TCP
    - name: voice-udp
      port: 64738
      targetPort: 64738
      nodePort: 64738
      protocol: UDP
