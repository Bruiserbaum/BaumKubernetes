apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: authentik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-server
  template:
    metadata:
      labels:
        app: authentik-server
    spec:
      nodeSelector:
        storage-tier: fast
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command: ['sh', '-c', 'until nc -z authentik-postgres 5432; do sleep 2; done']
      containers:
        - name: server
          image: ghcr.io/goauthentik/server:latest
          args: ["server"]
          envFrom:
            - configMapRef:
                name: authentik-config
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: AUTHENTIK_SECRET_KEY
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: PG_PASS
          ports:
            - containerPort: 9000
              name: http
            - containerPort: 9443
              name: https
          volumeMounts:
            - name: media
              mountPath: /media
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: authentik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-worker
  template:
    metadata:
      labels:
        app: authentik-worker
    spec:
      nodeSelector:
        storage-tier: fast
      containers:
        - name: worker
          image: ghcr.io/goauthentik/server:latest
          args: ["worker"]
          envFrom:
            - configMapRef:
                name: authentik-config
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: AUTHENTIK_SECRET_KEY
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: PG_PASS
          volumeMounts:
            - name: media
              mountPath: /media
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media-pvc
