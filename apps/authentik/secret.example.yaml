# DO NOT commit this file with real values.
# Copy to secret.yaml, fill in values, then: kubectl apply -f secret.yaml
# Or use: kubectl create secret generic authentik-secret --namespace authentik \
#   --from-literal=AUTHENTIK_SECRET_KEY="$(openssl rand -hex 32)" \
#   --from-literal=PG_PASS="$(openssl rand -hex 32)"
apiVersion: v1
kind: Secret
metadata:
  name: authentik-secret
  namespace: authentik
type: Opaque
stringData:
  AUTHENTIK_SECRET_KEY: "REPLACE_WITH_openssl_rand_hex_32"
  PG_PASS: "REPLACE_WITH_openssl_rand_hex_32"
