apiVersion: v1
kind: Namespace
metadata:
  name: meshcentral
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: meshcentral-config
  namespace: meshcentral
data:
  HOSTNAME: "mesh.example.com"
  ALLOW_NEW_ACCOUNTS: "true"
  WEBRTC: "false"
  IFRAME: "false"
  ALLOW_PLUGINS: "false"
  REVERSE_PROXY: "ingress-nginx-controller.ingress-nginx.svc.cluster.local"
  REVERSE_PROXY_TLS_PORT: "443"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meshcentral-data-pvc
  namespace: meshcentral
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-nvme
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meshcentral
  namespace: meshcentral
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meshcentral
  template:
    metadata:
      labels:
        app: meshcentral
    spec:
      nodeSelector:
        storage-tier: fast
      containers:
        - name: meshcentral
          image: ghcr.io/ylianst/meshcentral:latest
          envFrom:
            - configMapRef:
                name: meshcentral-config
          ports:
            - containerPort: 4430
              name: https
          volumeMounts:
            - name: data
              mountPath: /opt/meshcentral/meshcentral-data
          startupProbe:
            httpGet:
              path: /
              port: 4430
              scheme: HTTPS
            failureThreshold: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 4430
              scheme: HTTPS
            initialDelaySeconds: 0
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: meshcentral-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: meshcentral
  namespace: meshcentral
spec:
  selector:
    app: meshcentral
  ports:
    - port: 4430
      targetPort: 4430
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meshcentral
  namespace: meshcentral
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mesh.example.com
      secretName: meshcentral-tls
  rules:
    - host: mesh.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: meshcentral
                port:
                  number: 4430
